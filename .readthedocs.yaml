version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.12"
  apt_packages:
    - pandoc
  jobs:
    install:
      - pip install -r docs/requirements.txt
    build:
      html:
        - cd docs
        - mkdir -p "$READTHEDOCS_OUTPUT/html"
        - VIME_DOC_LANG=en sphinx-build -b html -D language=en --conf-dir ./ ./en "$READTHEDOCS_OUTPUT/html"
